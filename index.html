<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>26TOTS 박스 시뮬레이터</title>
    <style>
      body {
        margin: 0;
        background: #12152d;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      .top {
        display: flex;
        justify-content: space-between;
        padding: 15px 25px;
        background: #1c2148;
      }
      .wrap {
        display: flex;
        gap: 20px;
        padding: 20px;
      }
      .left,
      .center,
      .right {
        background: #eef0f7;
        color: #222;
        border-radius: 10px;
        padding: 20px;
      }
      .left {
        width: 180px;
      }
      .center {
        flex: 1;
        text-align: center;
      }
      .right {
        width: 360px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        margin: 8px 0;
        background: #dce3f3;
        font-weight: bold;
      }
      .box {
        width: 220px;
        height: 150px;
        margin: 20px auto;
        background: linear-gradient(135deg, #4d63ff, #1a28b8);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 28px;
        transition: 0.2s;
      }
      .shake {
        animation: shake 0.4s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: rotate(0);
        }
        20% {
          transform: rotate(-6deg);
        }
        40% {
          transform: rotate(6deg);
        }
        60% {
          transform: rotate(-4deg);
        }
        80% {
          transform: rotate(4deg);
        }
      }
      button {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border: none;
        border-radius: 6px;
        background: #10df67;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.1);
      }
      #result {
        font-size: 36px;
        color: #ffda44;
        margin: 20px 0;
        height: 45px;
      }
      #log {
        height: 220px;
        overflow: auto;
        background: #fff;
        color: #000;
        padding: 10px;
        border-radius: 6px;
      }
      .progress {
        height: 20px;
        background: #444;
        border-radius: 10px;
        overflow: hidden;
      }
      .bar {
        height: 100%;
        width: 0;
        background: #14ff6a;
      }
    </style>
  </head>
  <body>
    <div class="top">
      <div><h2>상자 열기</h2></div>
      <div style="width: 300px">
        <div>스페셜 부스트 x2</div>
        <div class="progress"><div class="bar" id="bar"></div></div>
      </div>
      <div>
        보유 상자 :
        <input
          id="boxes"
          type="number"
          min="0"
          value="150"
          style="
            width: 80px;
            padding: 5px;
            font-size: 16px;
            text-align: center;
            border-radius: 4px;
            border: none;
          "
          onchange="updateBoxes()"
        />
      </div>
    </div>

    <div class="wrap">
      <div class="left">
        <div class="row"><span>레전더리</span>x 800</div>
        <div class="row"><span>에픽</span>x 20</div>
        <div class="row"><span>레어</span>x 3</div>
        <div class="row"><span>노멀</span>x 1</div>
      </div>

      <div class="center">
        <div id="box" class="box">26TOTS BOX</div>
        <h2>26TOTS 프리미엄 열쇠 상자</h2>
        <div id="result"></div>

        <div
          id="summary"
          style="
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
          "
        ></div>
      </div>

      <div class="right">
        <button onclick="openOne()">직접 열기</button>
        <button onclick="open10()">10개 열기</button>
        <h3>개봉 로그</h3>
        <button
          onclick="clearLog()"
          style="width: auto; margin: 0; padding: 6px 12px; background: #e53935; font-size: 14px"
        >
          로그 지우기
        </button>
        <div id="log"></div>
      </div>
    </div>

    <script>
      let owned = 10,
        boost = 0;
      const rates = [
        { a: 800, p: 0.02 },
        { a: 20, p: 2.5 },
        { a: 3, p: 50 },
        { a: 1, p: 47.48 },
      ];
      const count = { 800: 0, 20: 0, 3: 0, 1: 0 };

      const color = {
        1600: '#ffd700',
        800: '#ff9800',
        40: '#ff1493',
        20: '#ff4081',
        6: '#00ffff',
        3: '#00bfff',
        2: '#bbbbbb',
        1: '#777777',
      };

      function draw() {
        document.getElementById('boxes').value = owned;
        document.getElementById('bar').style.width = Math.min(boost, 100) + '%';
      }

      function roll() {
        let r = Math.random() * 100,
          s = 0;
        for (let i of rates) {
          s += i.p;
          if (r <= s) return i.a;
        }
      }
      function addLog(t) {
        let log = document.getElementById('log');
        log.innerHTML = t + '<br>' + log.innerHTML;
      }
      function once() {
        if (owned <= 0) return;

        owned--;

        let b = document.getElementById('box');
        b.classList.add('shake');
        setTimeout(() => b.classList.remove('shake'), 400);

        let r = roll();

        // 부스트 발동
        if (boost >= 100) {
          r *= 2;
          boost = 0;

          document.getElementById('result').innerHTML =
            '🔥 스페셜 부스트 발동!<br>🎉 ' + r + '개 획득!';
        } else {
          const prevBoost = boost;
          boost = Math.min(boost + 10, 100);

          if (prevBoost < 100 && boost === 100) {
            alert('🚨 홀리 쓋!!!!!!\n\n🔥 다음 개봉 상자는 x2배 입니다!!!');
          }

          document.getElementById('result').innerHTML = '🎉 ' + r + '개 획득!';
        }

        count[r] = (count[r] || 0) + 1;

        document.getElementById('result').innerHTML = '🎉 ' + r + '개 획득!';

        addLog(new Date().toLocaleTimeString() + ' - ' + r + '개');

        draw();
      }
      function openOne() {
        once();
      }
      function open10() {
        if (owned <= 0) return;

        let openCnt = Math.min(10, owned);

        owned -= openCnt;

        let list = [];
        let total = {
          800: 0,
          20: 0,
          3: 0,
          1: 0,
        };

        let boostReady = false;

        for (let i = 0; i < openCnt; i++) {
          let r = roll();

          // 부스트 발동
          if (boost >= 100) {
            r *= 2;
            boost = 0;
          } else {
            const prevBoost = boost;
            boost = Math.min(boost + 10, 100);

            if (prevBoost < 100 && boost === 100) {
              boostReady = true;
            }
          }

          count[r] = (count[r] || 0) + 1;
          total[r] = (total[r] || 0) + 1;

          addLog(new Date().toLocaleTimeString() + ' - ' + r + '개');
        }

        // 10개 모두 연 뒤 한 번만 알림
        if (boostReady) {
          alert('🚨 홀리 쓋!!!!!!\n\n🔥 다음 개봉 상자는 x2배 입니다!!!');
        }

        document.getElementById('result').innerHTML = '🎉 ' + openCnt + '개 상자 오픈 완료!';

        document.getElementById('summary').innerHTML = `
        <span style="color:#ff9800">800개 : ${total[800]}</span>
        <span style="color:#ff4081">20개 : ${total[20]}</span>
        <span style="color:#00bfff">3개 : ${total[3]}</span>
        <span style="color:#777">1개 : ${total[1]}</span>
        `;

        draw();
      }

      function updateBoxes() {
        const value = parseInt(document.getElementById('boxes').value, 10);
        owned = isNaN(value) ? 0 : Math.max(0, value);
        draw();
      }

      function clearLog() {
        document.getElementById('log').innerHTML = '';
      }

      draw();
    </script>
  </body>
</html>
