<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>26TOTS 박스 시뮬레이터</title>
    <style>
      body {
        margin: 0;
        background: #12152d;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      .top {
        display: flex;
        justify-content: space-between;
        padding: 15px 25px;
        background: #1c2148;
      }
      .wrap {
        display: flex;
        gap: 20px;
        padding: 20px;
      }
      .left,
      .center,
      .right {
        background: #eef0f7;
        color: #222;
        border-radius: 10px;
        padding: 20px;
      }
      .left {
        width: 180px;
      }
      .center {
        flex: 1;
        text-align: center;
      }
      .right {
        width: 360px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        margin: 8px 0;
        background: #dce3f3;
        font-weight: bold;
      }
      .box {
        width: 260px;
        height: 260px;
        background: none;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px auto;
      }
      .box img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        pointer-events: none;
        filter: drop-shadow(0 15px 20px rgba(0, 0, 0, 0.45));
      }
      .shake {
        animation: shake 0.8s ease-in-out;
      }
      @keyframes shake {
        0% {
          transform: rotate(0) scale(1);
        }
        10% {
          transform: rotate(-8deg) scale(1.02);
        }
        20% {
          transform: rotate(8deg) scale(1.02);
        }
        30% {
          transform: rotate(-8deg) scale(1.03);
        }
        40% {
          transform: rotate(8deg) scale(1.03);
        }
        50% {
          transform: rotate(-7deg) scale(1.04);
        }
        60% {
          transform: rotate(7deg) scale(1.04);
        }
        70% {
          transform: rotate(-5deg) scale(1.02);
        }
        80% {
          transform: rotate(5deg) scale(1.01);
        }
        90% {
          transform: rotate(-2deg);
        }
        100% {
          transform: rotate(0);
        }
      }
      button {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border: none;
        border-radius: 6px;
        background: #10df67;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.1);
      }
      #result {
        font-size: 36px;
        color: #ffda44;
        margin: 20px 0;
        height: 45px;
      }
      #log {
        height: 220px;
        overflow: auto;
        background: #fff;
        color: #000;
        padding: 10px;
        border-radius: 6px;
      }
      .progress {
        display: flex;
        gap: 3px;
        height: 20px;
        background: #444;
        border-radius: 10px;
        padding: 3px;
        box-sizing: border-box;
      }
      .cell {
        flex: 1;
        background: #222;
        border-radius: 3px;
      }
      .cell.active {
        background: #14ff6a;
        box-shadow: 0 0 6px #14ff6a;
      }
      .legendary {
        color: #ffd700;
        font-weight: bold;
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000;
      }

      .epic {
        color: #ff3b30;
        font-weight: bold;
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000;
      }

      .rare {
        color: #1e90ff;
        font-weight: bold;
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000;
      }

      .normal {
        color: #666;
        font-weight: bold;
        text-shadow:
          -1px -1px 0 #fff,
          1px -1px 0 #fff,
          -1px 1px 0 #fff,
          1px 1px 0 #fff;
      }
    </style>
  </head>
  <body>
    <div class="top">
      <div><h2>상자 열기</h2></div>
      <div style="width: 300px">
        <div>스페셜 부스트 x2</div>
        <div class="progress">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
      </div>
      <div>
        보유 상자 :
        <input
          id="boxes"
          type="number"
          min="0"
          value="150"
          style="
            width: 80px;
            padding: 5px;
            font-size: 16px;
            text-align: center;
            border-radius: 4px;
            border: none;
          "
          onchange="updateBoxes()"
        />
      </div>
    </div>

    <div class="wrap">
      <div class="left">
        <div class="row"><span>레전더리</span>x 800</div>
        <div class="row"><span>에픽</span>x 20</div>
        <div class="row"><span>레어</span>x 3</div>
        <div class="row"><span>노멀</span>x 1</div>
      </div>

      <div class="center">
        <div id="box" class="box">
          <img
            src="https://ssl.nexon.com/s2/game/fc/online/event/2026/260625_special_key_c4956ow6f01/item/ticket_1.png"
            alt="26TOTS 프리미엄 열쇠 상자"
          />
        </div>
        <h2>26TOTS 프리미엄 열쇠 상자</h2>
        <div id="result"></div>

        <div
          id="summary"
          style="
            margin-top: 20px;
            padding-top: 15px;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
          "
        ></div>
      </div>

      <div class="right">
        <button onclick="openOne()">직접 열기</button>
        <button onclick="open10()">10개 열기</button>
        <div
          id="stats"
          style="
            background: #dce3f3;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: bold;
            line-height: 1.8;
          "
        >
          <div style="display: flex; justify-content: space-between">
            <span>📦 총 개봉 수</span>
            <span id="totalOpen">0개</span>
          </div>

          <div style="display: flex; justify-content: space-between">
            <span>🔑 총 열쇠 개수</span>
            <span id="totalKeys">0개</span>
          </div>

          <hr />

          <div style="display: flex; justify-content: space-between">
            <span class="legendary">🟨 레전더리 (800)</span>
            <span id="cnt800" class="legendary">0</span>
          </div>

          <div style="display: flex; justify-content: space-between">
            <span class="epic">🟥 에픽 (20)</span>
            <span id="cnt20" class="epic">0</span>
          </div>

          <div style="display: flex; justify-content: space-between">
            <span class="rare">🟦 레어 (3)</span>
            <span id="cnt3" class="rare">0</span>
          </div>

          <div style="display: flex; justify-content: space-between">
            <span class="normal">⬜ 노멀 (1)</span>
            <span id="cnt1" class="normal">0</span>
          </div>
        </div>

        <button
          onclick="resetStats()"
          style="background: #673ab7; color: #fff; font-size: 14px; padding: 8px"
        >
          📊 기록 초기화
        </button>

        <h3>개봉 로그</h3>

        <button
          onclick="clearLog()"
          style="width: auto; margin: 0; padding: 6px 12px; background: #e53935; font-size: 14px"
        >
          로그 지우기
        </button>
        <div id="log"></div>
      </div>
    </div>

    <script>
      let owned = 100,
        boost = 20;
      const rates = [
        { a: 800, p: 0.02 },
        { a: 20, p: 2.5 },
        { a: 3, p: 50 },
        { a: 1, p: 47.48 },
      ];
      const count = { 800: 0, 20: 0, 3: 0, 1: 0 };

      const color = {
        1600: '#ffd700',
        800: '#ff9800',
        40: '#ff1493',
        20: '#ff4081',
        6: '#00ffff',
        3: '#00bfff',
        2: '#bbbbbb',
        1: '#777777',
      };

      function draw() {
        document.getElementById('boxes').value = owned;
        const cells = document.querySelectorAll('.cell');

        cells.forEach((cell, index) => {
          if (index < boost / 10) {
            cell.classList.add('active');
          } else {
            cell.classList.remove('active');
          }
        });

        const totalOpen = count[800] + count[20] + count[3] + count[1];

        document.getElementById('totalOpen').innerText = totalOpen + '개';

        document.getElementById('cnt800').innerText = count[800];
        document.getElementById('cnt20').innerText = count[20];
        document.getElementById('cnt3').innerText = count[3];
        document.getElementById('cnt1').innerText = count[1];

        // 🔑 총 획득 열쇠 개수
        const totalKeys = count[800] * 800 + count[20] * 20 + count[3] * 3 + count[1];

        document.getElementById('totalKeys').innerText = totalKeys.toLocaleString() + '개';
      }

      function roll() {
        let r = Math.random() * 100,
          s = 0;
        for (let i of rates) {
          s += i.p;
          if (r <= s) return i.a;
        }
      }
      function addLog(t) {
        let log = document.getElementById('log');
        log.innerHTML = t + '<br>' + log.innerHTML;
      }
      function once() {
        if (owned <= 0) return;

        owned--;

        let b = document.getElementById('box');
        let result = document.getElementById('result');

        // 이전 10개 열기 결과 제거
        document.getElementById('summary').innerHTML = '';

        // 결과 숨기기
        result.innerHTML = '';

        b.classList.add('shake');

        // 흔들림 끝난 후 결과 공개
        setTimeout(() => {
          b.classList.remove('shake');

          let r = roll();
          const origin = r; // 원래 등급 저장

          if (boost >= 100) {
            r *= 2;
            boost = 0;

            switch (r) {
              case 1600:
                result.innerHTML =
                  '<span style="color:#ffd700">🔥🟨 레전더리 x2!!!!!<br>1600개 획득!!!!!</span>';
                break;

              case 40:
                result.innerHTML =
                  '<span style="color:#ff3b30">🔥🟥 에픽 x2!!!!<br>40개 획득!!!!</span>';
                break;

              case 6:
                result.innerHTML =
                  '<span style="color:#1e90ff">🔥🟦 레어 x2!!!<br>6개 획득!!!</span>';
                break;

              case 2:
                result.innerHTML =
                  '<span style="color:#ffffff">🔥⬜ 노멀 x2!!<br>2개 획득!!</span>';
                break;
            }
          } else {
            const prevBoost = boost;
            boost = Math.min(boost + 10, 100);

            if (prevBoost < 100 && boost === 100) {
              alert('🚨 홀리 쓋!!!!!!\n\n🔥 다음 개봉 상자는 x2배 입니다!!!');
            }

            switch (r) {
              case 800:
                result.innerHTML =
                  '<span style="color:#ffd700">🟨 레전더리!!!!<br>800개 획득!!!!</span>';
                break;

              case 20:
                result.innerHTML = '<span style="color:#ff3b30">🟥 에픽!!!<br>20개 획득!!!</span>';
                break;

              case 3:
                result.innerHTML = '<span style="color:#1e90ff">🟦 레어!!<br>3개 획득!!</span>';
                break;

              case 1:
                result.innerHTML = '<span style="color:#ffffff">⬜ 노멀!<br>1개 획득!</span>';
                break;
            }
          }

          count[origin]++;
          addLog(new Date().toLocaleTimeString() + ' - ' + r + '개');
          draw();
        }, 800); // ← shake 시간과 동일하게
      }

      function openOne() {
        once();
      }

      function open10() {
        if (owned <= 0) return;

        // 스페셜 부스트가 아직 안 찼다면
        let openCnt;

        if (boost < 100) {
          // 100%까지 필요한 개수 (10%씩 차니까)
          const need = Math.ceil((100 - boost) / 10);

          openCnt = Math.min(need, 10, owned);
        } else {
          // 이미 부스트가 차있으면 그냥 10개
          openCnt = Math.min(10, owned);
        }

        owned -= openCnt;

        let total = {
          800: 0,
          20: 0,
          3: 0,
          1: 0,
        };

        let boostReady = false;

        for (let i = 0; i < openCnt; i++) {
          let r = roll();
          const origin = r;

          // 부스트 발동
          if (boost >= 100) {
            r *= 2;
            boost = 0;
          } else {
            const prevBoost = boost;
            boost = Math.min(boost + 10, 100);

            if (prevBoost < 100 && boost === 100) {
              boostReady = true;
            }
          }

          count[origin]++;
          total[origin]++;

          addLog(new Date().toLocaleTimeString() + ' - ' + r + '개');
        }

        // 10개 모두 연 뒤 한 번만 알림
        if (boostReady) {
          alert('🚨 홀리 쓋!!!!!!\n\n🔥 다음 개봉 상자는 x2배 입니다!!!');
        }

        document.getElementById('result').innerHTML = '🎉 ' + openCnt + '개 상자 오픈 완료!';

        document.getElementById('summary').innerHTML = `
        <span style="color:#ff9800">800개 : ${total[800]}</span>
        <span style="color:#ff4081">20개 : ${total[20]}</span>
        <span style="color:#00bfff">3개 : ${total[3]}</span>
        <span style="color:#777">1개 : ${total[1]}</span>
        `;

        draw();
      }

      function updateBoxes() {
        const value = parseInt(document.getElementById('boxes').value, 10);
        owned = isNaN(value) ? 0 : Math.max(0, value);
        draw();
      }

      function clearLog() {
        document.getElementById('log').innerHTML = '';
      }

      function resetStats() {
        if (!confirm('📊 개봉 기록을 초기화 할까요?')) {
          return;
        }

        // 등급 카운트 초기화
        count[800] = 0;
        count[20] = 0;
        count[3] = 0;
        count[1] = 0;

        // 부스트 초기화
        boost = 20;

        // 결과 제거
        document.getElementById('result').innerHTML = '';

        // 10개 열기 결과 제거
        document.getElementById('summary').innerHTML = '';

        // 로그 제거
        document.getElementById('log').innerHTML = '';

        draw();
      }

      draw();
    </script>
  </body>
</html>
